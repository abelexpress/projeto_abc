<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Produto</title>
    <style>
      * {
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }

      #card {
        width: 300px;
        min-height: 400px;
        background-color: rgb(130, 130, 134);
        border-radius: 30px;
        padding: 30px 10px;
      }
      #img {
        width: 100%;
        height: 300px;
        background-image: url("https://dasports.com.br/cdn/shop/products/camisa-selecao-brasil-2223-nike-amarelo-7719396.jpg?v=1756700834");
        background-position: center;
        background-size: cover;
        border-radius: 30px;
        margin: auto;
      }
      #card h2 {
        font-size: 2rem;
        font-weight: 800;
        color: white;
      }
      #card p {
        font-weight: 400;
        color: white;
        font-size: 1rem;
      }

      #card a {
        display: inline-block;
        text-align: center;
        padding: 10px 0px;
        width: 100%;
        background-color: green;
        color: white;
        text-decoration: none;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="img"></div>
      <h2>Blusa Brasa</h2>
      <p>A Brasa do Brasil.</p>
      <a href="">Comprar</a>
    </div>
  </body>
</html>
