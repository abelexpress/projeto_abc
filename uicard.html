<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ui Card</title>
    <style>
      #ui-card {
        width: 300px;
        min-height: 400px;
        background-color: rgba(255, 165, 31, 0.877);
        border-radius: 20px;
        padding: 30px 10px 20px 10px;
      }
      #card-image {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTh-dT9pyeTrk30OPa-g9FYrD5wLShxvfozgQ&s);
        width: 150px;
        height: 150px;
        background-position: center;
        background-size: cover;
        border-radius: 50%;
        margin: 0 auto;
      }
      h2 {
        text-align: center;
        margin-top: 20px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="ui-card">
      <div id="card-image"></div>
      <h2>Cartão Digital</h2>
      <ul>
        <li><a href="#">Whatsapp</a></li>
        <li><a href="#">Instagram</a></li>
        <li><a href="#">Site</a></li>
      </ul>
    </div>
  </body>
</html>
