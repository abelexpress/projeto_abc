<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ui Card</title>
    <style>
      * {
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #ui-card {
        width: 300px;
        min-height: 400px;
        background-color: rgba(255, 165, 31, 0.877);
        border-radius: 20px;
        text-align: center;
        padding: 20px;
      }
      #card-image {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTh-dT9pyeTrk30OPa-g9FYrD5wLShxvfozgQ&s);
        width: 150px;
        height: 150px;
        background-position: center;
        background-size: cover;
        border-radius: 50%;
        margin: 10px auto;
        padding: 16px;
      }
      h2 {
        text-align: center;
        margin-top: 20px;
        color: #fff;
      }
      a {
        display: block;
        width: 80%;
        text-align: center;
        margin: 10px auto;
        color: #000000;
        text-decoration: none;
        font-size: 18px;
        background-color: rgb(255, 255, 255);
        border-radius: 10px;
        padding: 10px;
      }
      a:hover {
        background-color: rgba(0, 0, 0, 0.5);
      }
      p {
        text-align: center;
        color: #fff;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div id="ui-card">
      <div id="card-image"></div>
      <h2>Banco inter</h2>
      <div>
        <p>Venha nos conhecer!</p>
        <a href="#">Whatsapp</a>
        <a href="#">Instagram</a>
        <a href="#">Site</a>
      </div>
    </div>
  </body>
</html>
